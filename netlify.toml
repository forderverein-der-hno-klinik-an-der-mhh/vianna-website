# Netlify builds the static Pelican site and publishes its generated files.
[build]
  command = "bash scripts/build-site.sh"
  publish = "html"

[build.environment]
  PYTHON_VERSION = "3.13"

# Keep the legacy .html URL structure instead of Netlify's Pretty URLs.
[build.processing.html]
  pretty_urls = false

# Legacy URL aliases formerly handled by Apache's .htaccess.
# The original EnFI target /03_enfi-2015 is no longer generated; the rule below
# points to the current published location instead.
[[redirects]]
  from = "/workgroups"
  to = "/01_workgroups"
  status = 301
  force = true

[[redirects]]
  from = "/workgroups/*"
  to = "/01_workgroups/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/ags"
  to = "/01_workgroups"
  status = 301
  force = true

[[redirects]]
  from = "/ags/*"
  to = "/01_workgroups/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/enfi-2015"
  to = "/03_past-events/01_enfi-2015"
  status = 301
  force = true

[[redirects]]
  from = "/enfi-2015/*"
  to = "/03_past-events/01_enfi-2015/:splat"
  status = 301
  force = true

